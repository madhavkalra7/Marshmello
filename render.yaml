services:
  - type: web
    name: marshmello-django
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn youtify.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.9.18"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "youtify.settings"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
